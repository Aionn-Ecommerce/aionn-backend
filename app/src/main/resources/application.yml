spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  application:
    name: ${APP_NAME:ecommerce-backend}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_LOCAL_PORT:5434}/${POSTGRES_DB_NAME:ecommerce-backend}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_DB_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:${REDIS_LOCAL_PORT:6381}}
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": true

server:
  port: ${SERVER_PORT:8085}

logging:
  level:
    "[com.ecommerce]": DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

identity:
  registration:
    max-verify-attempts: ${MAX_VERIFY_ATTEMPTS:5}
    resend-cooldown-seconds: ${RESEND_COOLDOWN_SECONDS:60}
    otp-expiry-seconds: ${OTP_EXPIRY_SECONDS:300}
    expose-otp-in-response: ${IDENTITY_REGISTRATION_EXPOSE_OTP_IN_RESPONSE:false}
    captcha:
      provider: ${CAPTCHA_PROVIDER:mock}
      expected-token: ${CAPTCHA_EXPECTED_TOKEN:}
      google-site-key: ${CAPTCHA_GOOGLE_SITE_KEY:}
      google-secret-key: ${CAPTCHA_GOOGLE_SECRET_KEY:}
    twilio:
      enabled: ${TWILIO_ENABLED:false}
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-phone-number: ${TWILIO_FROM_PHONE_NUMBER:}
