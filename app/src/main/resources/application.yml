server:
  port: ${SERVER_PORT}

spring:
  application:
    name: ${APP_NAME:aionn-backend}
  config:
    import:
      - classpath:application-identity.yml
      - classpath:application-catalog.yml
      - classpath:application-inventory.yml
      - classpath:application-ordering.yml
      - classpath:application-payment.yml
      - classpath:application-shipping.yml
      - classpath:application-notification.yml
      - classpath:application-promotion.yml
      - classpath:application-chat.yml
      - classpath:application-ucp.yml

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_LOCAL_PORT:5432}/${POSTGRES_DB_NAME:aionn}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_DB_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_MS:60000}
      pool-name: aionn-hikari

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:${REDIS_LOCAL_PORT:6379}}
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${SPRING_MAIL_HOST:${DEV_MAIL_HOST:}}
    port: ${SPRING_MAIL_PORT:${DEV_MAIL_PORT:587}}
    username: ${SPRING_MAIL_USERNAME:${DEV_MAIL_USERNAME:}}
    password: ${SPRING_MAIL_PASSWORD:${DEV_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

shared-kernel:
  cache:
    two-tier:
      enabled: ${SHARED_KERNEL_TWO_TIER_CACHE_ENABLED:true}
      origin: ${SHARED_KERNEL_CACHE_ORIGIN:}

security:
  idempotency:
    enabled: ${SECURITY_IDEMPOTENCY_ENABLED:true}
    processing-ttl-seconds: ${SECURITY_IDEMPOTENCY_PROCESSING_TTL_SECONDS:60}
  ip:
    trusted-proxies: ${SECURITY_IP_TRUSTED_PROXIES:}
    cors:
      allowed-origins: ${SECURITY_CORS_ALLOWED_ORIGINS:}
    rate-limits:
      - path: /api/v1/registrations/initiate
        method: POST
        max-requests: ${SECURITY_IP_REG_INIT_MAX_REQUESTS:5}
        window-seconds: ${SECURITY_IP_REG_INIT_WINDOW_SECONDS:60}
      - path: /api/v1/auth/login
        method: POST
        max-requests: ${SECURITY_IP_LOGIN_MAX_REQUESTS:10}
        window-seconds: ${SECURITY_IP_LOGIN_WINDOW_SECONDS:60}
      - path: /api/v1/auth/refresh
        method: POST
        max-requests: ${SECURITY_IP_REFRESH_MAX_REQUESTS:30}
        window-seconds: ${SECURITY_IP_REFRESH_WINDOW_SECONDS:60}
      - path: /api/v1/security/password-reset-requests
        method: POST
        max-requests: ${SECURITY_IP_RESET_REQ_MAX_REQUESTS:3}
        window-seconds: ${SECURITY_IP_RESET_REQ_WINDOW_SECONDS:300}
      - path: /api/v1/auth/social-login
        method: POST
        max-requests: ${SECURITY_IP_SOCIAL_LOGIN_MAX_REQUESTS:10}
        window-seconds: ${SECURITY_IP_SOCIAL_LOGIN_WINDOW_SECONDS:60}
      - path: /api/v1/registrations/*/verify-otp
        method: POST
        max-requests: ${SECURITY_IP_VERIFY_OTP_MAX_REQUESTS:5}
        window-seconds: ${SECURITY_IP_VERIFY_OTP_WINDOW_SECONDS:300}
      - path: /api/v1/security/password-reset
        method: POST
        max-requests: ${SECURITY_IP_RESET_COMPLETE_MAX_REQUESTS:5}
        window-seconds: ${SECURITY_IP_RESET_COMPLETE_WINDOW_SECONDS:300}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    "[com.aionn]": ${LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
