server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: ${APP_NAME:ecommerce-backend}

  config:
    import:
      - optional:file:../.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

identity:
  registration:
    max-verify-attempts: ${MAX_VERIFY_ATTEMPTS:5}
    resend-cooldown-seconds: ${RESEND_COOLDOWN_SECONDS:60}
    otp-expiry-seconds: ${OTP_EXPIRY_SECONDS:300}
    expose-otp-in-response: ${IDENTITY_REGISTRATION_EXPOSE_OTP_IN_RESPONSE:false}
    captcha:
      provider: ${CAPTCHA_PROVIDER:mock}
      expected-token: ${CAPTCHA_EXPECTED_TOKEN:}
      google-site-key: ${CAPTCHA_GOOGLE_SITE_KEY:}
      google-secret-key: ${CAPTCHA_GOOGLE_SECRET_KEY:}
    twilio:
      enabled: ${TWILIO_ENABLED:false}
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-phone-number: ${TWILIO_FROM_PHONE_NUMBER:}

security:
  ip:
    blacklist: ${SECURITY_IP_BLACKLIST:}
    rate-limits:
      - path: /api/v1/registrations/initiate
        method: POST
        max-requests: ${SECURITY_IP_REG_INIT_MAX_REQUESTS:5}
        window-seconds: ${SECURITY_IP_REG_INIT_WINDOW_SECONDS:60}

logging:
  level:
    "[com.ecommerce]": DEBUG
