# UCP module — Universal Commerce Protocol integration.
# Reads protocol version, namespace URLs, signing keys and feature flags from env.
ucp:
  protocol-version: ${UCP_PROTOCOL_VERSION:2026-01-23}
  schema-base-url: ${UCP_SCHEMA_BASE_URL:https://ucp.dev/2026-01-23}
  spec-base-url: ${UCP_SPEC_BASE_URL:https://ucp.dev/2026-01-23/specification}
  endpoint-base-url: ${UCP_ENDPOINT_BASE_URL:http://localhost:8080}
  signature:
    enforce: ${UCP_SIGNATURE_ENFORCE:false}
    key-id: ${UCP_SIGNING_KEY_ID:aionn-ucp-key-1}
    private-key-pem: ${UCP_SIGNING_PRIVATE_KEY_PEM:}
    public-key-pem: ${UCP_SIGNING_PUBLIC_KEY_PEM:}
  capabilities:
    catalog-search: true
    catalog-lookup: true
    checkout: ${UCP_CAPABILITY_CHECKOUT_ENABLED:true}
    order: ${UCP_CAPABILITY_ORDER_ENABLED:true}
    fulfillment: ${UCP_CAPABILITY_FULFILLMENT_ENABLED:true}
    discount: ${UCP_CAPABILITY_DISCOUNT_ENABLED:true}
    identity-linking: ${UCP_CAPABILITY_IDENTITY_LINKING_ENABLED:true}
  webhook:
    enabled: ${UCP_WEBHOOK_ENABLED:true}
    delay-ms: ${UCP_WEBHOOK_DELAY_MS:30000}
    batch-size: ${UCP_WEBHOOK_BATCH_SIZE:50}
    max-attempts: ${UCP_WEBHOOK_MAX_ATTEMPTS:5}
    request-timeout-ms: ${UCP_WEBHOOK_REQUEST_TIMEOUT_MS:5000}
  platform-profile:
    cache-ttl-seconds: ${UCP_PLATFORM_PROFILE_CACHE_TTL_SECONDS:600}
    fetch-timeout-ms: 5000
