spring:
  application:
    name: identity

  flyway:
    enabled: true
    locations: classpath:db/migration

identity:
  registration:
    max-verify-attempts: ${MAX_VERIFY_ATTEMPTS:5}
    resend-cooldown-seconds: ${RESEND_COOLDOWN_SECONDS:60}
    otp-expiry-seconds: ${OTP_EXPIRY_SECONDS:300}
    session-expires-days: ${REGISTRATION_SESSION_EXPIRES_DAYS:30}
    rate-limit:
      ip-max-attempts: ${REGISTRATION_IP_MAX_ATTEMPTS:3}
      ip-window-seconds: ${REGISTRATION_IP_WINDOW_SECONDS:300}
      phone-max-attempts: ${REGISTRATION_PHONE_MAX_ATTEMPTS:1}
      phone-window-seconds: ${REGISTRATION_PHONE_WINDOW_SECONDS:60}
    captcha:
      expected-token: ${CAPTCHA_EXPECTED_TOKEN:}
    twilio:
      enabled: ${TWILIO_ENABLED:false}
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-phone-number: ${TWILIO_FROM_PHONE_NUMBER:}
  auth:
    client-type-header: ${AUTH_CLIENT_TYPE_HEADER:X-Client-Type}
    mobile-client-value: ${AUTH_MOBILE_CLIENT_VALUE:mobile}
    session:
      expires-days: ${AUTH_SESSION_EXPIRES_DAYS:30}
  address:
    max-address-numbers: ${MAX_ADDRESS_NUMBERS:5}
