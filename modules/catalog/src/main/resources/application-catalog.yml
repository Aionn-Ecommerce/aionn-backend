spring:
  application:
    name: catalog

  flyway:
    enabled: true
    locations: classpath:db
    out-of-order: true

catalog:
  merchant-search-sync:
    page-size: ${CATALOG_MERCHANT_SEARCH_SYNC_PAGE_SIZE:100}
  search:
    opensearch:
      host: ${CATALOG_SEARCH_OPENSEARCH_HOST:localhost}
      port: ${CATALOG_SEARCH_OPENSEARCH_PORT:9200}
      scheme: ${CATALOG_SEARCH_OPENSEARCH_SCHEME:http}
  media:
    provider: ${CATALOG_MEDIA_PROVIDER:cloudinary}
    cloudinary:
      product-image-folder: ${CLOUDINARY_PRODUCT_IMAGE_FOLDER:aionn/catalog/products}
